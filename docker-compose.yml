services:
  mongo:
    image: mongo:7
    container_name: taxiofany-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: taxiofany-backend
    restart: unless-stopped
    environment:
      PORT: 3000
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/taxiofany
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
    container_name: taxiofany-frontend
    restart: unless-stopped
    environment:
      PORT: 3001
      NODE_ENV: production
      APP_NAME: Taxiofany Frontend
      API_BASE_URL: http://backend:3000/api/v1
    depends_on:
      - backend
    ports:
      - "3001:3001"

volumes:
  mongo_data:
