services:
  mongo:
    image: mongo:7
    container_name: taxiofany-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: taxiofany-backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      PORT: ${BACKEND_PORT:-3000}
      MONGO_URI: ${MONGO_URI_DOCKER:-mongodb://mongo:27017/taxiofany}
      I18N_USERS_VIEWS_DIR: /frontend/views/users
    volumes:
      - ./frontend/views:/frontend/views:ro
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-3000}:${BACKEND_PORT:-3000}"

  frontend:
    build:
      context: ./frontend
    container_name: taxiofany-frontend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      PORT: ${FRONTEND_PORT:-3001}
      API_BASE_URL: ${API_BASE_URL_DOCKER:-http://backend:3000/api/v1}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3001}:${FRONTEND_PORT:-3001}"

volumes:
  mongo_data:
